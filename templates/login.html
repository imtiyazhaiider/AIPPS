<!DOCTYPE html>
<html>
<head>
<title>AIPPS Login</title>
<style>
body {display:flex;justify-content:center;align-items:center;height:100vh;background:#111;color:white;}
.box {background:#222;padding:30px;border-radius:10px;text-align:center;}
input {display:block;margin:10px;padding:10px;}
button {background:red;color:white;padding:10px;border:none;}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<form method="POST">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>
<p style="color:red;">{{ error }}</p>
</div>

</body>
</html>
