<!DOCTYPE html>
<html>
<head>
    <title>Login - AIPPS</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111;
            color: white;
            font-family: Arial;
        }

        .box {
            background: #222;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px;
            background: red;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>AIPPS Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Login</button>
    </form>

    <p style="color:red;">{{ error }}</p>
</div>

</body>
</html>
