<!DOCTYPE html>
<html>
<head>
    <title>AIPPS 🎬</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<a href="/logout" class="logout">Logout</a>

<div class="bg">
    <img id="bgImage">
</div>

<div class="card">
    <h1>AIPPS 🎬</h1>

    <form method="POST" onsubmit="showLoader()">
        <input type="text" name="movie" id="movieInput" placeholder="Enter movie name" required>
        <button>🚀 Post</button>
    </form>

    <div class="loader" id="loader">⏳ Posting...</div>

    <div class="preview" id="preview">
        <img id="posterPreview">
    </div>
</div>

<div class="popup" id="popup">✅ Posted Successfully</div>

<div class="movie-list">
    <h3 style="text-align:center;">🎬 Posted Movies</h3>
    <ul>
        {% for movie in movies %}
            <li>{{ movie }}</li>
        {% endfor %}
    </ul>
</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}

/* SUCCESS POPUP */
{% if status == "success" %}
    setTimeout(() => {
        let popup = document.getElementById("popup");
        popup.style.display = "block";
        setTimeout(() => popup.style.display = "none", 3000);
    }, 500);
{% endif %}

/* PREVIEW + BACKGROUND */
document.getElementById("movieInput").addEventListener("input", function() {
    let name = this.value;

    if (!name) return;

    fetch(`https://api.themoviedb.org/3/search/movie?api_key=a417402d4b7c4899327fdb7b438cdfaf&query=${name}`)
    .then(res => res.json())
    .then(data => {
        if (data.results.length > 0) {
            let movie = data.results[0];

            let poster = "https://image.tmdb.org/t/p/w500" + movie.poster_path;
            let backdrop = "https://image.tmdb.org/t/p/original" + movie.backdrop_path;

            document.getElementById("posterPreview").src = poster;
            document.getElementById("preview").style.display = "block";
            document.getElementById("bgImage").src = backdrop;
        }
    });
});

<div class="movie-list">
    <ul>
        {% for movie in movies %}
            <li>{{ movie }}</li>
        {% endfor %}
    </ul>
</div>
</script>

</body>
</html>
