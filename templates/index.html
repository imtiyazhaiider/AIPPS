<!DOCTYPE html>
<html>
<head>
    <title>AIPPS 🎬</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .card {
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            margin-bottom: 15px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #ff0000, #b30000);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .preview {
            margin-top: 15px;
            display: none;
        }

        .preview img {
            width: 100%;
            border-radius: 10px;
        }

        /* POPUP */
        .popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00c853;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            display: none;
            animation: slide 0.5s ease;
        }

        @keyframes slide {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loader {
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>AIPPS 🎬</h1>

    <form method="POST" onsubmit="showLoader()">
        <input type="text" name="movie" id="movieInput" placeholder="Enter movie name" required>
        <button type="submit">🚀 Post</button>
    </form>

    <div class="loader" id="loader">⏳ Posting...</div>

    <div class="preview" id="preview">
        <img id="posterPreview">
    </div>
</div>

<!-- SUCCESS POPUP -->
<div class="popup" id="popup">✅ Posted Successfully</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}

/* SHOW POPUP FROM BACKEND */
{% if status == "success" %}
    setTimeout(function() {
        let popup = document.getElementById("popup");
        popup.style.display = "block";

        setTimeout(function() {
            popup.style.display = "none";
        }, 3000);
    }, 500);
{% endif %}

/* PREVIEW (FAKE PREVIEW USING TMDB IMAGE URL PATTERN) */
document.getElementById("movieInput").addEventListener("change", function() {
    let name = this.value;

    if (!name) return;

    fetch(`https://api.themoviedb.org/3/search/movie?api_key=a417402d4b7c4899327fdb7b438cdfaf&query=${name}`)
    .then(res => res.json())
    .then(data => {
        if (data.results.length > 0) {
            let poster = data.results[0].poster_path;
            let url = "https://image.tmdb.org/t/p/w500" + poster;

            document.getElementById("posterPreview").src = url;
            document.getElementById("preview").style.display = "block";
        }
    });
});
</script>

</body>
</html>
