<!DOCTYPE html>
<html>
<head>
    <title>AIPPS 🎬</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(25px) brightness(0.4);
        }

        .card {
            background: rgba(0,0,0,0.6);
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 60px rgba(0,0,0,0.8);
        }

        h1 {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, red, darkred);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
        }

        .preview img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .loader {
            margin-top: 10px;
            display: none;
        }

        .popup {
            position: fixed;
            bottom: 20px;
            background: #00c853;
            padding: 10px 20px;
            border-radius: 10px;
            display: none;
        }

        .movie-list {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.9);
            padding: 10px;
        }

        .movie-list ul {
            list-style: none;
            text-align: center;
        }

        .logout {
            position: absolute;
            top: 15px;
            right: 15px;
            background: red;
            padding: 5px 10px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
        }
    </style>
</head>

<body>

<a href="/logout" class="logout">Logout</a>

<div class="bg">
    <img id="bgImage">
</div>

<div class="card">
    <h1>AIPPS 🎬</h1>

    <form method="POST" onsubmit="showLoader()">
        <input type="text" name="movie" id="movieInput" placeholder="Enter movie name" required>
        <button>🚀 Post</button>
    </form>

    <div class="loader" id="loader">⏳ Posting...</div>

    <div class="preview" id="preview">
        <img id="posterPreview">
    </div>
</div>

<div class="popup" id="popup">✅ Posted Successfully</div>

<div class="movie-list">
    <h3 style="text-align:center;">🎬 Posted Movies</h3>
    <ul>
        {% for movie in movies %}
            <li>{{ movie }}</li>
        {% endfor %}
    </ul>
</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}

/* SUCCESS POPUP */
{% if status == "success" %}
    setTimeout(() => {
        let popup = document.getElementById("popup");
        popup.style.display = "block";
        setTimeout(() => popup.style.display = "none", 3000);
    }, 500);
{% endif %}

/* PREVIEW + BACKGROUND */
document.getElementById("movieInput").addEventListener("input", function() {
    let name = this.value;

    if (!name) return;

    fetch(`https://api.themoviedb.org/3/search/movie?api_key=a417402d4b7c4899327fdb7b438cdfaf&query=${name}`)
    .then(res => res.json())
    .then(data => {
        if (data.results.length > 0) {
            let movie = data.results[0];

            let poster = "https://image.tmdb.org/t/p/w500" + movie.poster_path;
            let backdrop = "https://image.tmdb.org/t/p/original" + movie.backdrop_path;

            document.getElementById("posterPreview").src = poster;
            document.getElementById("preview").style.display = "block";
            document.getElementById("bgImage").src = backdrop;
        }
    });
});

<div class="movie-list">
    <ul>
        {% for movie in movies %}
            <li>{{ movie }}</li>
        {% endfor %}
    </ul>
</div>
</script>

</body>
</html>
