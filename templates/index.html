<!DOCTYPE html>
<html>
<head>
    <title>AIPPS 🎬</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 350px;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #e50914;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #ff1f1f;
        }

        .msg {
            margin-top: 15px;
            font-size: 14px;
            color: #ccc;
        }

        .loader {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>AIPPS 🎬</h1>

    <form method="POST" onsubmit="showLoader()">
        <input type="text" name="movie" placeholder="Enter movie name" required>
        <button type="submit">Post to Instagram</button>
    </form>

    <div class="loader" id="loader">⏳ Posting...</div>

    <div class="msg">{{ message }}</div>
</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
