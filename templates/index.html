<!DOCTYPE html>
<html>
<head>
    <title>AIPPS 🎬</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 40px;
            background: #111;
            color: white;
        }

        input {
            padding: 12px;
            width: 80%;
            max-width: 300px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #e50914;
            color: white;
            font-size: 16px;
        }

        button:hover {
            background: #ff1f1f;
        }

        h1 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>AIPPS 🎬</h1>

    <form method="POST">
        <input type="text" name="movie" placeholder="Enter movie name" required>
        <br>
        <button type="submit">Post to Instagram</button>
    </form>

    <p>{{ message }}</p>

</body>
</html>
