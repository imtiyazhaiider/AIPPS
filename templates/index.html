<!DOCTYPE html>
<html>
<head>
    <title>AIPPS 🎬</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* BACKGROUND IMAGE */
        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: -2;
        }

        .bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(25px) brightness(0.4);
        }

        /* CARD */
        .card {
            backdrop-filter: blur(25px);
            background: rgba(0,0,0,0.5);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 60px rgba(0,0,0,0.8);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: scale(0.9);}
            to {opacity: 1; transform: scale(1);}
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            margin-bottom: 15px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #ff0000, #ff4d4d);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,0,0,0.6);
        }

        /* POSTER PREVIEW */
        .preview {
            margin-top: 15px;
            display: none;
        }

        .preview img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.7);
        }

        /* LOADER */
        .loader {
            margin-top: 10px;
            display: none;
        }

        /* POPUP */
        .popup {
            position: fixed;
            bottom: 30px;
            background: #00c853;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            from {transform: translateY(50px); opacity: 0;}
            to {transform: translateY(0); opacity: 1;}
        }

    </style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
    <img id="bgImage" src="">
</div>

<div class="card">
    <h1>AIPPS 🎬</h1>

    <form method="POST" onsubmit="showLoader()">
        <input type="text" name="movie" id="movieInput" placeholder="Enter movie name" required>
        <button type="submit">🚀 Post</button>
    </form>

    <div class="loader" id="loader">⏳ Posting...</div>

    <div class="preview" id="preview">
        <img id="posterPreview">
    </div>
</div>

 <div style="position:fixed; bottom:0; width:100%; max-height:200px; overflow:auto; background:rgba(0,0,0,0.85); padding:10px; color:white;">
    <h3 style="text-align:center;">🎬 Posted Movies</h3>
    <ul style="list-style:none; padding:0; text-align:center;">
        {% for movie in movies %}
            <li style="margin:5px 0;">{{ movie }}</li>
        {% endfor %}
    </ul>
</div>

<div class="popup" id="popup">✅ Posted Successfully</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}

/* SUCCESS POPUP */
{% if status == "success" %}
    setTimeout(() => {
        let popup = document.getElementById("popup");
        popup.style.display = "block";

        setTimeout(() => popup.style.display = "none", 3000);
    }, 500);
{% endif %}

/* LIVE PREVIEW + BACKGROUND */
document.getElementById("movieInput").addEventListener("input", function() {
    let name = this.value;

    if (!name) return;

    fetch(`https://api.themoviedb.org/3/search/movie?api_key=a417402d4b7c4899327fdb7b438cdfaf&query=${name}`)
    .then(res => res.json())
    .then(data => {
        if (data.results.length > 0) {
            let movie = data.results[0];

            let poster = "https://image.tmdb.org/t/p/w500" + movie.poster_path;
            let backdrop = "https://image.tmdb.org/t/p/original" + movie.backdrop_path;

            document.getElementById("posterPreview").src = poster;
            document.getElementById("preview").style.display = "block";

            document.getElementById("bgImage").src = backdrop;
        }
    });
});
</script>

</body>
</html>
